<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRCX — Sign Up</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0F1A2E;
      color: #F1F5F9;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .auth-card {
      background: #1C2D45;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      border: 1px solid rgba(255,255,255,0.07);
    }
    .auth-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .auth-logo-text { font-size: 20px; font-weight: 700; }
    .auth-logo-sub { font-size: 11px; color: #94A3B8; margin-top: -2px; }
    h1 { font-size: 22px; margin-bottom: 8px; }
    .auth-subtitle { font-size: 14px; color: #94A3B8; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: #CBD5E1; margin-bottom: 6px; }
    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      background: #162236;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      color: #F1F5F9;
      font-size: 14px;
      outline: none;
    }
    input:focus { border-color: #0D9488; }
    .btn {
      width: 100%;
      padding: 11px;
      background: #0D9488;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn:hover { background: #14B8A8; }
    .error {
      background: rgba(239,68,68,0.12);
      color: #EF4444;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .hint {
      font-size: 11px;
      color: #64748B;
      margin-top: 4px;
    }
    .switch {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #94A3B8;
    }
    .switch a { color: #0D9488; text-decoration: none; }
    .switch a:hover { color: #14B8A8; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="32" height="36" viewBox="0 0 32 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 2L3 7V18C3 25.5 8.8 32.4 16 34C23.2 32.4 29 25.5 29 18V7L16 2Z" stroke="#0D9488" stroke-width="2" stroke-linejoin="round"/>
        <path d="M16 2L3 7V18C3 25.5 8.8 32.4 16 34C23.2 32.4 29 25.5 29 18V7L16 2Z" fill="#0D9488" fill-opacity="0.12"/>
      </svg>
      <div>
        <div class="auth-logo-text">GRCX</div>
        <div class="auth-logo-sub">Regulatory Intelligence</div>
      </div>
    </div>
    <h1>Start your free trial</h1>
    <p class="auth-subtitle">Monitor regulatory change across BoE, FCA, MAS, SEC and ESMA.</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="form-group">
        <label for="name">Full name</label>
        <input type="text" id="name" name="name" required placeholder="Jane Smith">
      </div>
      <div class="form-group">
        <label for="email">Work email</label>
        <input type="email" id="email" name="email" required placeholder="you@company.com">
      </div>
      <div class="form-group">
        <label for="company">Company</label>
        <input type="text" id="company" name="company" required placeholder="Acme Financial Ltd">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="8" placeholder="Minimum 8 characters">
      </div>
      <button type="submit" class="btn">Create account</button>
    </form>
    <div class="switch">Already have an account? <a href="/sign-in">Sign in</a></div>
  </div>
</body>
</html>
