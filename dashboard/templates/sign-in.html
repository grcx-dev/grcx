<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GRCX — Sign In</title>
  <style>
    body { background: #0F1A2E; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    #sign-in { min-height: 400px; }
  </style>
</head>
<body>
  <div id="sign-in"></div>
<script
    crossorigin="anonymous"
    data-clerk-publishable-key="{{ clerk_publishable_key }}"
    src="https://clerk.grcx.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
    type="text/javascript"
  ></script>
  <script>
    window.addEventListener('load', async function () {
      await Clerk.load();
      if (Clerk.user) {
        window.location.href = '/';
      } else {
        Clerk.mountSignIn(document.getElementById('sign-in'));
      }
    });
  </script>
  </body>
</html>
