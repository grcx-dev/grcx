<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GRCX — Sign In</title>
  <style>
    body { background: #0F1A2E; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    #sign-in { min-height: 400px; }
  </style>
</head>
<body>
  <div id="sign-in"></div>
  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="{{ clerk_publishable_key }}"
    src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
    type="text/javascript"
  ></script>
  <script>
    window.addEventListener('load', async () => {
      await window.Clerk.load();
      if (window.Clerk.user) {
        window.location.href = '/';
      } else {
        window.Clerk.mountSignIn(document.getElementById('sign-in'), {
          afterSignInUrl: '/',
          afterSignUpUrl: '/',
        });
      }
    });
  </script>
</body>
</html>
