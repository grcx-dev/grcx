sentinels:
  regulatory:
    - type: rss
      url: https://www.bankofengland.co.uk/rss/publications
      jurisdiction: BOE

    - type: imap
      host: ${GRCX_IMAP_HOST}
      username: ${GRCX_IMAP_USERNAME}
      sender_filter: FCA@fcanewsletters.org.uk
      jurisdiction: FCA

    - type: imap
      host: ${GRCX_IMAP_HOST}
      username: ${GRCX_IMAP_USERNAME}
      sender_filter: "@mas.gov.sg"
      jurisdiction: MAS

    - type: rss
      url: https://www.sec.gov/news/pressreleases.rss
      jurisdiction: SEC

    - type: rss
      url: https://www.sec.gov/news/statements.rss
      jurisdiction: SEC

    # SEC enforcement feeds (litigation releases, admin proceedings) return 403
    # from Akamai CDN for all automated clients — no working RSS available.



controls:
  frameworks:
    - iso27001
    - fca_sysc
    - mas_trm
    - nist_csf
    - bcbs239
    - soc2

resolver:
  llm: claude-haiku-4-5-20251001
  auto_remediate: notify_only

audit:
  output: ./grcx-audit/
  sign: false
