app = 'grcx'
primary_region = 'ams'

[build]

[mounts]
  source = 'grcx_data'
  destination = '/data'

[http_service]
  internal_port = 5001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
